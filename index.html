<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB Online - Sekolah Cerdas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        header { background-color: #0056b3; color: white; padding: 2rem; text-align: center; }
        header h1 { margin: 0; font-size: 2.5rem; }
        nav { display: flex; justify-content: center; background-color: #004494; padding: 1rem; position: sticky; top: 0; }
        nav a { color: white; text-decoration: none; margin: 0 1.5rem; font-weight: bold; transition: color 0.3s; }
        nav a:hover { color: #ffc107; }
        .container { max-width: 700px; margin: 3rem auto; background: white; padding: 2.5rem; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #555; }
        input[type="text"], input[type="email"], select, input[type="number"] { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1rem; }
        input:focus, select:focus { outline: none; border-color: #0056b3; box-shadow: 0 0 5px rgba(0,86,179,0.3); }
        button { background-color: #28a745; color: white; padding: 1rem; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #218838; }
        .info-box { background-color: #e9ecef; padding: 1rem; border-left: 4px solid #0056b3; margin-bottom: 2rem; border-radius: 4px; }
        footer { text-align: center; padding: 1.5rem; background-color: #333; color: #bbb; margin-top: 3rem; }
    </style>
</head>
<body>

<header>
    <h1>Penerimaan Peserta Didik Baru (PPDB)</h1>
    <p>Tahun Ajaran 2026/2027</p>
</header>

<nav>
    <a href="#beranda">Beranda</a>
    <a href="#daftar">Pendaftaran</a>
    <a href="#jadwal">Jadwal</a>
    <a href="#kontak">Kontak</a>
</nav>

<div class="container" id="daftar">
    <h2>Formulir Pendaftaran Siswa Baru</h2>
    
    <div class="info-box">
        <p><strong>Perhatian:</strong> Pastikan data yang Anda masukkan sesuai dengan dokumen asli (Ijazah/Kartu Keluarga).</p>
    </div>

    <form action="#" method="POST">
        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" name="nama" required placeholder="Masukkan nama lengkap">
        </div>
        <div class="form-group">
            <label for="nisn">NISN (Nomor Induk Siswa Nasional)</label>
            <input type="number" id="nisn" name="nisn" required placeholder="Masukkan 10 digit NISN">
        </div>
        <div class="form-group">
            <label for="asal_sekolah">Asal Sekolah</label>
            <input type="text" id="asal_sekolah" name="asal_sekolah" required placeholder="Contoh: SMP Negeri 1 Jakarta">
        </div>
        <div class="form-group">
            <label for="jurusan">Pilihan Jurusan</label>
            <select id="jurusan" name="jurusan" required>
                <option value="">-- Pilih Jurusan --</option>
                <option value="IPA">Ilmu Pengetahuan Alam (IPA)</option>
                <option value="IPS">Ilmu Pengetahuan Sosial (IPS)</option>
                <option value="BAHASA">Bahasa</option>
            </select>
        </div>
        <div class="form-group">
            <label for="no_hp">Nomor WhatsApp Aktif</label>
            <input type="number" id="no_hp" name="no_hp" required placeholder="08xxxxxxxxxx">
        </div>
        <button type="submit">Kirim Pendaftaran</button>
    </form>
</div>

<footer>
    <p>&copy; 2026 Panitia PPDB. Hak Cipta Dilindungi.</p>
</footer>

</body>
</html>
